services:
  center:
    build:
      context: ../..
      dockerfile: deploy/center-image/Dockerfile
    volumes:
      - center-data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  center-data:
