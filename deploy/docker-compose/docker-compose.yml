services:
  center:
    build:
      context: ../..
      dockerfile: deploy/center-image/Dockerfile
    environment:
      # Center 对外可访问的根地址，用于 Agent 文档中生成完整链接
      # 未设置时从请求头自动推导，反向代理场景建议显式配置
      # APIPRISM_CENTER_EXTERNAL_URL: https://api.example.com
      APIPRISM_STORAGE_DATA_DIR: /app/data
    volumes:
      - center-data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  center-data:
